<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!-- ===== ZERO-FAIL FAVICON STACK ===== -->

<!-- 1. ICO: Legacy IE & browsers that only sniff .ico -->
<link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/RSWI1/RS-iconGEN@main/favicon.ico">

<!-- 2. PNG 16×16: Old tabs, Windows jump lists -->
<link rel="icon" type="image/png" sizes="16x16" href="hhttps://cdn.jsdelivr.net/gh/RSWI1/RS-iconGEN@main/favicon.ico">

<!-- 3. PNG 32×32: Standard desktop tabs (Retina) -->
<link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/RSWI1/RS-iconGEN@main/favicon.ico">

<!-- 4. SVG: Modern browsers (Chrome 80+, Firefox 41+, Safari 9+) — infinite scale, tiny file -->
<link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/RSWI1/RS-iconGEN@main/favicon.ico">

<!-- 5. Apple Touch: iOS Home Screen + Safari bookmarks (MUST be opaque, no transparency) -->
<link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/RSWI1/RS-iconGEN@main/favicon.ico">

<!-- 6. Safari Pinned Tab (monochrome SVG, single-color paths only) -->
<link rel="mask-icon" href="https://cdn.jsdelivr.net/gh/RSWI1/RSView@main/safari-pinned-tab.svg?v=2" color="#00fbff">
<title>Squircle Icon Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#080a10;--bg2:#0e1119;--bg3:#151a28;--card:#1a2035;--card2:#202842;
  --border:#283050;--border2:#354068;--fg:#e8ecf8;--fg2:#b8c4e0;--muted:#5a6888;
  --accent:#ff6b35;--accent2:#ff8f5e;--accent-dim:rgba(255,107,53,.1);--accent-glow:rgba(255,107,53,.25);
  --ios:#007aff;--android:#3ddc84;--macos:#bf5af2;--watch:#00d4aa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes orbF1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(50px,30px) scale(1.1)}}
@keyframes orbF2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-50px) scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(30px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(30px) scale(.95)}}

.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;opacity:.06}
.orb1{width:500px;height:500px;background:var(--accent);top:-150px;left:-100px;animation:orbF1 20s ease-in-out infinite}
.orb2{width:400px;height:400px;background:#6366f1;bottom:-100px;right:-80px;animation:orbF2 24s ease-in-out infinite}

.container{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:1}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;animation:fadeUp .6s ease-out}
.logo-row{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ff3d00);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(255,107,53,.2)}
.logo-icon i{color:#fff;font-size:20px}
.logo-text{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:var(--accent)}

.main-grid{display:grid;grid-template-columns:1fr 360px;gap:24px;animation:fadeUp .6s ease-out .1s both}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}}

.preview-panel{background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.preview-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto}
.preview-tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;transition:all .2s;font-family:'Space Grotesk';white-space:nowrap;border-bottom:2px solid transparent}
.preview-tab:hover{color:var(--fg)}
.preview-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.preview-area{display:flex;align-items:center;justify-content:center;min-height:420px;padding:32px;position:relative}
.preview-area canvas{max-width:100%;max-height:380px;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.4)}

.upload-zone{width:100%;max-width:340px;padding:48px 32px;border:2px dashed var(--border);border-radius:20px;text-align:center;cursor:pointer;transition:all .3s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.upload-zone .uz-icon{width:64px;height:64px;border-radius:16px;margin:0 auto 16px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;transition:transform .3s}
.upload-zone:hover .uz-icon{transform:scale(1.1) rotate(-5deg)}
.upload-zone h3{font-size:16px;font-weight:600;margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--muted)}

.size-grid-area{padding:16px 20px;border-top:1px solid var(--border)}
.size-grid-area h5{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;font-weight:600}
.size-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.size-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .2s}
.size-item:hover{transform:scale(1.08)}
.size-item canvas{border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.size-item span{font-size:9px;color:var(--muted);font-family:'Space Grotesk';font-weight:600}

.controls{display:flex;flex-direction:column;gap:16px}
.ctrl-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;transition:border-color .2s}
.ctrl-card:hover{border-color:var(--border2)}
.ctrl-card h4{font-size:12px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.8px;color:var(--fg2)}
.ctrl-card h4 i{font-size:11px;color:var(--accent)}

.slider-wrap{margin-bottom:14px}
.slider-wrap:last-child{margin-bottom:0}
.slider-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.slider-head label{font-size:12px;color:var(--fg2);font-weight:500}
.slider-head .sval{font-size:11px;color:var(--accent);font-weight:700;font-family:'Space Grotesk';min-width:40px;text-align:right}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer;transition:box-shadow .2s}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 4px var(--accent-glow)}

.shape-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.shape-btn{padding:10px 6px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Space Grotesk';text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.shape-btn:hover{border-color:var(--accent);color:var(--fg)}
.shape-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.shape-btn canvas{border-radius:2px}

.color-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.color-row label{font-size:12px;color:var(--fg2);min-width:70px}
.color-row input[type=color]{width:36px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;padding:2px}
.color-row .hex-input{flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:12px;font-family:'Space Grotesk';outline:none}
.color-row .hex-input:focus{border-color:var(--accent)}

.grad-dir{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:10px}
.grad-dir button{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.grad-dir button:hover{border-color:var(--accent);color:var(--fg)}
.grad-dir button.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

.platform-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;padding-right:4px}
.platform-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .2s}
.platform-item:hover{border-color:var(--border2);background:rgba(255,255,255,.02)}
.platform-item.active{border-color:var(--accent);background:var(--accent-dim)}
.platform-item .pi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.platform-item .pi-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap}
.platform-item .pi-badge{font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;font-family:'Space Grotesk'}
.platform-item .pi-size{font-size:11px;color:var(--muted);font-family:'Space Grotesk'}

.export-btns{display:flex;flex-direction:column;gap:8px}
.exp-btn{padding:14px;border-radius:12px;border:none;font-size:13px;font-weight:700;font-family:'Space Grotesk';cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.exp-btn.primary{background:linear-gradient(135deg,var(--accent),#ff3d00);color:#fff;box-shadow:0 6px 24px rgba(255,107,53,.2)}
.exp-btn.primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(255,107,53,.3)}
.exp-btn.ghost{background:var(--card);color:var(--fg2);border:1px solid var(--border)}
.exp-btn.ghost:hover{border-color:var(--accent);color:var(--fg)}
.exp-btn.zip{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 6px 24px rgba(99,102,241,.2)}
.exp-btn.zip:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(99,102,241,.3)}
.exp-btn:disabled{opacity:.4;pointer-events:none}

.compare-row{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:8px}
.compare-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.compare-item span{font-size:10px;color:var(--muted);font-family:'Space Grotesk';font-weight:600}
.compare-item canvas{border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.3)}

.toast-container{position:fixed;bottom:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 18px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--fg);font-size:12px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:toastIn .3s ease-out;display:flex;align-items:center;gap:8px}
.toast.exit{animation:toastOut .2s ease-in forwards}

.info-tip{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--card);color:var(--muted);font-size:9px;cursor:help;margin-left:4px;border:1px solid var(--border)}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <header class="header">
    <div class="logo-row">
      <div class="logo-icon"><i class="fas fa-vector-square" style="font-size:18px"></i></div>
      <h1 class="logo-text">Squircle<span>Lab</span></h1>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:11px;color:var(--muted)"><i class="fas fa-lock" style="color:var(--accent);margin-right:4px"></i>100% local processing</span>
    </div>
  </header>

  <div class="main-grid">
    <!-- Left: Preview -->
    <div class="preview-panel">
      <div class="preview-tabs">
        <button class="preview-tab active" data-tab="preview">Preview</button>
        <button class="preview-tab" data-tab="compare">Compare</button>
        <button class="preview-tab" data-tab="sizes">All Sizes</button>
      </div>

      <div class="preview-area" id="previewArea">
        <div class="upload-zone" id="uploadZone">
          <div class="uz-icon"><i class="fas fa-cloud-arrow-up" style="color:var(--accent);font-size:28px"></i></div>
          <h3>Drop your icon here</h3>
          <p>or click to browse — PNG, JPG, SVG</p>
          <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>
        <canvas id="mainPreview" style="display:none"></canvas>
      </div>

      <div class="size-grid-area" id="sizeGridArea" style="display:none">
        <h5>Generated Sizes</h5>
        <div class="size-grid" id="sizeGrid"></div>
      </div>
    </div>

    <!-- Right: Controls -->
    <div class="controls">
      <!-- Shape -->
      <div class="ctrl-card">
        <h4><i class="fas fa-shapes"></i> Shape</h4>
        <div class="shape-grid" id="shapeGrid"></div>
        <div class="slider-wrap" style="margin-top:14px">
          <div class="slider-head">
            <label>Corner Smoothness <span class="info-tip" title="Controls the squircle curvature. iOS uses ~0.7, Android uses ~0.9">?</span></label>
            <span class="sval" id="smoothVal">0.70</span>
          </div>
          <input type="range" id="smoothSlider" min="0" max="100" value="70">
        </div>
        <div class="slider-wrap">
          <div class="slider-head">
            <label>Icon Padding</label>
            <span class="sval" id="paddingVal">10%</span>
          </div>
          <input type="range" id="paddingSlider" min="0" max="40" value="10">
        </div>
      </div>

      <!-- Background -->
      <div class="ctrl-card">
        <h4><i class="fas fa-palette"></i> Background</h4>
        <div class="shape-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:12px">
          <button class="shape-btn active" data-bg="solid">Solid</button>
          <button class="shape-btn" data-bg="gradient">Gradient</button>
          <button class="shape-btn" data-bg="transparent">None</button>
        </div>
        <div id="solidBg">
          <div class="color-row">
            <label>Color</label>
            <input type="color" id="bgColor" value="#ffffff">
            <input type="text" class="hex-input" id="bgHex" value="#ffffff" maxlength="7">
          </div>
        </div>
        <div id="gradientBg" style="display:none">
          <div class="color-row">
            <label>Start</label>
            <input type="color" id="gradStart" value="#ff6b35">
            <input type="text" class="hex-input" id="gradStartHex" value="#ff6b35" maxlength="7">
          </div>
          <div class="color-row">
            <label>End</label>
            <input type="color" id="gradEnd" value="#ff3d00">
            <input type="text" class="hex-input" id="gradEndHex" value="#ff3d00" maxlength="7">
          </div>
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Direction</label>
          <div class="grad-dir" id="gradDir"></div>
        </div>
      </div>

      <!-- Platform Presets -->
      <div class="ctrl-card">
        <h4><i class="fas fa-mobile-screen"></i> Platform Presets</h4>
        <div class="platform-list" id="platformList"></div>
      </div>

      <!-- Export -->
      <div class="ctrl-card">
        <h4><i class="fas fa-download"></i> Export</h4>
        <div class="export-btns">
          <button class="exp-btn primary" id="exportCurrent" disabled><i class="fas fa-image"></i> Export Current PNG</button>
          <button class="exp-btn zip" id="exportZip" disabled><i class="fas fa-file-zipper"></i> Export JSON + Icons (.zip)</button>
          <button class="exp-btn ghost" id="exportAllPng" disabled><i class="fas fa-images"></i> Export All as Individual PNGs</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

// ====== SQUIRCLE MATH ======
function createSquirclePath(ctx, cx, cy, size, smooth) {
  const r = size / 2;
  const n = 2 + (1 - smooth) * 8;
  ctx.beginPath();
  const steps = 360;
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const cosT = Math.cos(t), sinT = Math.sin(t);
    const x = Math.sign(cosT) * Math.pow(Math.abs(cosT), 2/n) * r;
    const y = Math.sign(sinT) * Math.pow(Math.abs(sinT), 2/n) * r;
    if (i === 0) ctx.moveTo(cx + x, cy + y); else ctx.lineTo(cx + x, cy + y);
  }
  ctx.closePath();
}

function createRoundRectPath(ctx, cx, cy, size, radius) {
  const r = size / 2, cr = r * radius;
  const x = cx - r, y = cy - r, w = size, h = size;
  ctx.beginPath();
  ctx.moveTo(x + cr, y); ctx.lineTo(x + w - cr, y); ctx.arcTo(x + w, y, x + w, y + cr, cr);
  ctx.lineTo(x + w, y + h - cr); ctx.arcTo(x + w, y + h, x + w - cr, y + h, cr);
  ctx.lineTo(x + cr, y + h); ctx.arcTo(x, y + h, x, y + h - cr, cr);
  ctx.lineTo(x, y + cr); ctx.arcTo(x, y, x + cr, y, cr); ctx.closePath();
}

function createCirclePath(ctx, cx, cy, size) {
  ctx.beginPath(); ctx.arc(cx, cy, size / 2, 0, Math.PI * 2); ctx.closePath();
}

function createShapePath(ctx, cx, cy, size, shape, smooth) {
  switch (shape) {
    case 'squircle': createSquirclePath(ctx, cx, cy, size, smooth); break;
    case 'roundrect': createRoundRectPath(ctx, cx, cy, size, smooth * 0.5); break;
    case 'circle': createCirclePath(ctx, cx, cy, size); break;
    case 'square': ctx.beginPath(); ctx.rect(cx - size/2, cy - size/2, size, size); ctx.closePath(); break;
    default: createSquirclePath(ctx, cx, cy, size, smooth);
  }
}

// ====== RENDER ======
function renderIcon(canvas, size, shape, smooth, pad, bg, gStart, gEnd, gAngle, bgM, img) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  const iconSize = size * (1 - pad);
  const cx = size / 2, cy = size / 2;

  createShapePath(ctx, cx, cy, iconSize, shape, smooth);
  if (bgM === 'solid') { ctx.fillStyle = bg; ctx.fill(); }
  else if (bgM === 'gradient') {
    const rad = (gAngle * Math.PI) / 180;
    const dx = Math.cos(rad) * iconSize / 2, dy = Math.sin(rad) * iconSize / 2;
    const grad = ctx.createLinearGradient(cx - dx, cy - dy, cx + dx, cy + dy);
    grad.addColorStop(0, gStart); grad.addColorStop(1, gEnd);
    ctx.fillStyle = grad; ctx.fill();
  } else {
    ctx.save(); ctx.clip();
    const cs = Math.max(4, size / 32);
    for (let y = 0; y < size; y += cs) for (let x = 0; x < size; x += cs) {
      ctx.fillStyle = (Math.floor(x/cs) + Math.floor(y/cs)) % 2 === 0 ? '#1a1d28' : '#22263a';
      ctx.fillRect(x, y, cs, cs);
    }
    ctx.restore();
  }

  if (img) {
    ctx.save();
    createShapePath(ctx, cx, cy, iconSize, shape, smooth);
    ctx.clip();
    const imgAspect = img.width / img.height;
    let drawW, drawH;
    if (imgAspect > 1) { drawH = iconSize; drawW = iconSize * imgAspect; }
    else { drawW = iconSize; drawH = iconSize / imgAspect; }
    ctx.drawImage(img, cx - drawW / 2, cy - drawH / 2, drawW, drawH);
    ctx.restore();
  }

  if (shape === 'squircle' || shape === 'roundrect') {
    createShapePath(ctx, cx, cy, iconSize, shape, smooth);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = Math.max(1, size / 512); ctx.stroke();
  }
}

function renderPreview() {
  if (!srcImg) return;
  const canvas = document.getElementById('mainPreview');
  renderIcon(canvas, 512, currentShape, smoothness, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
  document.getElementById('exportCurrent').disabled = false;
  document.getElementById('exportZip').disabled = false;
  document.getElementById('exportAllPng').disabled = false;
}

function renderSizeGrid() {
  if (!srcImg) return;
  const grid = document.getElementById('sizeGrid');
  grid.innerHTML = '';
  PLATFORMS.forEach(p => {
    const item = document.createElement('div');
    item.className = 'size-item';
    const c = document.createElement('canvas');
    const displayDim = Math.min(p.size, 64);
    c.style.width = displayDim + 'px'; c.style.height = displayDim + 'px';
    renderIcon(c, p.size, currentShape, smoothness, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
    const label = document.createElement('span');
    label.textContent = p.size + 'px';
    item.appendChild(c); item.appendChild(label);
    item.addEventListener('click', () => exportSingle(p.size, p.filename || `icon-${p.size}x${p.size}.png`));
    grid.appendChild(item);
  });
}

// ====== FILE HANDLING ======
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const mainPreview = document.getElementById('mainPreview');

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]) });
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover') });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]) });
document.addEventListener('paste', e => {
  const items = e.clipboardData && e.clipboardData.items; if (!items) return;
  for (const item of items) { if (item.type.startsWith('image/')) { loadImage(item.getAsFile()); break } }
});

function loadImage(file) {
  if (!file.type.startsWith('image/')) { showToast('Not a valid image file', 'error'); return }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      uploadZone.style.display = 'none'; mainPreview.style.display = 'block';
      renderPreview();
      if (activeTab === 'sizes') renderSizeGrid();
      showToast('Image loaded — adjust shape and export', 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ====== SHAPE PREVIEW BUTTONS ======
function buildShapeGrid() {
  const grid = document.getElementById('shapeGrid');
  const shapes = [
    { id: 'squircle', name: 'Squircle' },
    { id: 'roundrect', name: 'Round Rect' },
    { id: 'circle', name: 'Circle' },
    { id: 'square', name: 'Square' },
    { id: 'ios', name: 'iOS Style' },
    { id: 'android', name: 'Android' },
  ];
  shapes.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'shape-btn' + (s.id === 'squircle' ? ' active' : '');
    btn.dataset.shape = s.id;
    const c = document.createElement('canvas');
    c.width = 28; c.height = 28;
    const ctx = c.getContext('2d');
    let shape = s.id, smooth = smoothness;
    if (s.id === 'ios') { shape = 'squircle'; smooth = 0.7; }
    else if (s.id === 'android') { shape = 'squircle'; smooth = 0.9; }
    else if (s.id === 'roundrect') { smooth = 0.45; }
    createShapePath(ctx, 14, 14, 24, shape, smooth);
    ctx.fillStyle = '#ff6b35'; ctx.fill();
    btn.appendChild(c);
    const span = document.createElement('span'); span.textContent = s.name; span.style.fontSize = '9px';
    btn.appendChild(span);
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (s.id === 'ios') { currentShape = 'squircle'; smoothness = 0.7; document.getElementById('smoothSlider').value = 70; document.getElementById('smoothVal').textContent = '0.70'; }
      else if (s.id === 'android') { currentShape = 'squircle'; smoothness = 0.9; document.getElementById('smoothSlider').value = 90; document.getElementById('smoothVal').textContent = '0.90'; }
      else if (s.id === 'roundrect') { currentShape = 'roundrect'; smoothness = 0.45; document.getElementById('smoothSlider').value = 45; document.getElementById('smoothVal').textContent = '0.45'; }
      else { currentShape = s.id; }
      renderPreview(); if (activeTab === 'sizes') renderSizeGrid();
    });
    grid.appendChild(btn);
  });
}
buildShapeGrid();

});

// ====== BACKGROUND ======
document.querySelectorAll('[data-bg]').forEach(btn => {

    document.querySelectorAll('[data-bg]').forEach(b => b.classList.remove('active'));

    document.getElementById('solidBg').style.display = bgMode === 'solid' ? '' : 'none';
    document.getElementById('gradientBg').style.display = bgMode === 'gradient' ? '' : 'none';

  });
});

function syncColor(pickerId, hexId, setter) {
  const picker = document.getElementById(pickerId), hex = document.getElementById(hexId);
  picker.addEventListener('input', () => { hex.value = picker.value; setter(picker.value); renderPreview(); if (activeTab === 'sizes') renderSizeGrid() });
  hex.addEventListener('input', () => { if (/^#[0-9a-fA-F]{6}$/.test(hex.value)) { picker.value = hex.value; setter(hex.value); renderPreview(); if (activeTab === 'sizes') renderSizeGrid() } });
}
syncColor('bgColor', 'bgHex', v => bgColor = v);
syncColor('gradStart', 'gradStartHex', v => gradStart = v);
syncColor('gradEnd', 'gradEndHex', v => gradEnd = v);

function buildGradDir() {
  const container = document.getElementById('gradDir');
  const dirs = [0, 45, 90, 135, 180, 225, 270, 315];
  const arrows = ['→', '↗', '↑', '↖', '←', '↙', '↓', '↘'];
  dirs.forEach((d, i) => {
    const btn = document.createElement('button'); btn.textContent = arrows[i]; btn.title = d + '°';
    if (d === gradAngle) btn.classList.add('active');
    btn.addEventListener('click', () => {
      container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); gradAngle = d; renderPreview(); if (activeTab === 'sizes') renderSizeGrid();
    });
    container.appendChild(btn);
  });
}
buildGradDir();

// ====== PLATFORM LIST ======
function buildPlatformList() {
  const list = document.getElementById('platformList');
  // Show group headers + items
  const groups = {ios:'Apple iOS', android:'Android', macos:'macOS', pwa:'Progressive Web App'};
  const shown = {};
  PLATFORMS.forEach(p => {
    if (!shown[p.group]) {
      shown[p.group] = true;
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 12px 2px;';
      hdr.textContent = groups[p.group] || p.group;
      list.appendChild(hdr);
    }
    const item = document.createElement('div');
    item.className = 'platform-item' + (p.id === 'ios' ? ' active' : '');
    item.dataset.platform = p.id;
    item.innerHTML = `
      <span class="pi-dot" style="background:${p.color}"></span>
      <span class="pi-name">${p.name}</span>
      <span class="pi-badge" style="background:${p.color}22;color:${p.color}">${p.badge}</span>
    `;
    item.addEventListener('click', () => {
      list.querySelectorAll('.platform-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active'); currentPlatform = p.id;

      document.getElementById('smoothVal').textContent = smoothness.toFixed(2);

      showToast(`Preset: ${p.name}`, 'info');

    list.appendChild(item);
  });
}
buildPlatformList();

// ====== PREVIEW TABS ======
document.querySelectorAll('.preview-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active'); activeTab = tab.dataset.tab;
    document.getElementById('sizeGridArea').style.display = activeTab === 'sizes' ? '' : 'none';
    if (activeTab === 'sizes' && srcImg) renderSizeGrid();

  });

function renderCompare() {
  if (!srcImg) return;
  const area = document.getElementById('previewArea');
  const existing = area.querySelector('.compare-row');
  if (existing) existing.remove();
  const row = document.createElement('div');
  row.className = 'compare-row'; row.style.cssText = 'position:absolute;bottom:16px;left:50%;transform:translateX(-50%)';
  [{name:'Square',shape:'square',s:0},{name:'Round Rect',shape:'roundrect',s:0.45},{name:'Squircle',shape:'squircle',s:smoothness},{name:'Circle',shape:'circle',s:1}].forEach(s => {
    const item = document.createElement('div'); item.className = 'compare-item';
    const c = document.createElement('canvas'); c.style.width = '48px'; c.style.height = '48px';
    renderIcon(c, 128, s.shape, s.s, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
    const label = document.createElement('span'); label.textContent = s.name;
    item.appendChild(c); item.appendChild(label); row.appendChild(item);
  });
  area.appendChild(row);

// ====== EXPORT SINGLE PNG ======
function exportSingle(size, filename) {
  if (!srcImg) return;
  const c = document.createElement('canvas');
  renderIcon(c, size, currentShape, smoothness, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename || `icon-${size}x${size}.png`;
    a.click(); URL.revokeObjectURL(url);
    showToast(`Exported ${size}x${size} PNG`, 'success');
  }, 'image/png');
}

document.getElementById('exportCurrent').addEventListener('click', () => {
  const p = PLATFORMS.find(p => p.id === currentPlatform) || PLATFORMS[0];
  exportSingle(p.size, p.filename);
});

document.getElementById('exportAllPng').addEventListener('click', () => {
  if (!srcImg) return;
  PLATFORMS.forEach((p, i) => {
    setTimeout(() => {
      const c = document.createElement('canvas');
      renderIcon(c, p.size, p.shape, p.smooth, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
      c.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = p.filename || `${p.id}-icon-${p.size}x${p.size}.png`;
        a.click(); URL.revokeObjectURL(url);
      }, 'image/png');
    }, i * 300);
  });
  showToast(`Exporting ${PLATFORMS.length} individual PNGs...`, 'success');
});

// ====== EXPORT JSON + ZIP ======
function generateIosContentsJson(files) {
  const images = files.map(f => ({
    filename: f.filename, idiom: f.idiom || 'universal', scale: f.scale || '1x', size: f.logicalSize || `${f.size}x${f.size}`
  }));
  return JSON.stringify({ images: images, info: { author: "squirclelab", version: 1 } }, null, 2);
}

function generateMacContentsJson(files) {
  const images = files.map(f => ({
    idiom: "mac",
    size: f.logicalSize || `${f.size}x${f.size}`,
    scale: f.scale || '1x',
    filename: f.filename
  }));
  return JSON.stringify({ images: images, info: { version: 1, author: "xcode" } }, null, 2);
}

function generatePwaManifest(files) {
  const icons = files.map(f => ({ src: "icons/" + f.filename, sizes: `${f.size}x${f.size}`, type: "image/png" }));
  return JSON.stringify({
    name: "App", short_name: "App", display: "standalone",
    background_color: bgMode === 'solid' ? bgColor : "#ffffff",
    theme_color: bgMode === 'solid' ? bgColor : "#ffffff",
    icons: icons
  }, null, 2);
}

document.getElementById('exportZip').addEventListener('click', async () => {
  if (!srcImg) return;
  const btn = document.getElementById('exportZip');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating ZIP...';

  try {
    const zip = new JSZip();
    const groups = {};

    // Group platforms
    PLATFORMS.forEach(p => {
      if (!groups[p.group]) groups[p.group] = [];
      groups[p.group].push(p);
    });

    // Generate iOS Assets.xcassets
    if (groups.ios) {
      const iosFolder = zip.folder("Assets.xcassets").folder("AppIcon.appiconset");
      const iosFiles = [];
      for (const p of groups.ios) {
        const canvas = document.createElement('canvas');
        renderIcon(canvas, p.size, currentShape, smoothness, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
        const blob = await canvasToBlob(canvas);
        iosFolder.file(p.filename, blob);
        iosFiles.push(p);
      }
      iosFolder.file("Contents.json", generateIosContentsJson(iosFiles));
    }

    // Generate Android mipmaps
    if (groups.android) {
      for (const p of groups.android) {
        const canvas = document.createElement('canvas');
        renderIcon(canvas, p.size, currentShape, smoothness, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
        const blob = await canvasToBlob(canvas);
        const folderName = p.folder ? `android/${p.folder}` : 'android';
        zip.folder(folderName).file(p.filename, blob);
      }
    }

    // Generate macOS
    if (groups.macos) {
      const macFolder = zip.folder("macos").folder("AppIcon.appiconset");
      const macFiles = [];
      for (const p of groups.macos) {
        const canvas = document.createElement('canvas');
        renderIcon(canvas, p.size, currentShape, smoothness, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
        const blob = await canvasToBlob(canvas);
        macFolder.file(p.filename, blob);
        macFiles.push(p);
      }
      macFolder.file("Contents.json", generateMacContentsJson(macFiles));
    }

    // Generate PWA
    if (groups.pwa) {
      const pwaFolder = zip.folder("pwa").folder("icons");
      const pwaFiles = [];
      for (const p of groups.pwa) {
        const canvas = document.createElement('canvas');
        renderIcon(canvas, p.size, currentShape, smoothness, padding, bgColor, gradStart, gradEnd, gradAngle, bgMode, srcImg);
        const blob = await canvasToBlob(canvas);
        pwaFolder.file(p.filename, blob);
        pwaFiles.push(p);
      }
      zip.folder("pwa").file("manifest.json", generatePwaManifest(pwaFiles));
    }

    // Generate and download
    const content = await zip.generateAsync({ type: "blob" });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a'); a.href = url; a.download = "app-icons.zip";
    a.click(); URL.revokeObjectURL(url);

    showToast('ZIP with JSON manifests exported successfully!', 'success');
  } catch (err) {
    showToast('Error generating ZIP: ' + err.message, 'error');
    console.error(err);
  }

  btn.disabled = false; btn.innerHTML = '<i class="fas fa-file-zipper"></i> Export JSON + Icons (.zip)';
});

function canvasToBlob(canvas) {
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

// ====== TOAST ======
function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className = 'toast';
  const icons = { success: 'fa-check-circle', warning: 'fa-exclamation-triangle', error: 'fa-times-circle', info: 'fa-info-circle' };
  const colors = { success: '#00e8a2', warning: '#ffb830', error: '#ff4477', info: '#38bdf8' };
  t.innerHTML = `<i class="fas ${icons[type]||icons.info}" style="color:${colors[type]||colors.info}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('exit'); setTimeout(() => t.remove(), 200) }, 3200);
}

// ====== INTERACTIVE PREVIEW ======
mainPreview.addEventListener('click', () => {
  if (!srcImg) return;
  if (mainPreview.dataset.showing === 'original') {
    mainPreview.dataset.showing = 'squircle'; renderPreview();
  } else {
    mainPreview.dataset.showing = 'original';
    const ctx = mainPreview.getContext('2d');
    mainPreview.width = 512; mainPreview.height = 512; ctx.clearRect(0, 0, 512, 512);
    const imgAspect = srcImg.width / srcImg.height;
    let dw, dh;
    if (imgAspect > 1) { dw = 512; dh = 512 / imgAspect; } else { dh = 512; dw = 512 * imgAspect; }
    ctx.drawImage(srcImg, (512 - dw) / 2, (512 - dh) / 2, dw, dh);
  }
});

// Particles
(function createParticles() {
  const shapes = ['fa-square', 'fa-circle', 'fa-diamond'];
  for (let i = 0; i < 6; i++) {

    document.body.appendChild(el);
  }
})();

})();
